<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowTask</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      .flowtask-container {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        position: absolute !important;
        left: -9999px !important;
      }
      .flowtask-container.css-loaded {
        display: flex !important;
        visibility: visible !important;
        opacity: 1 !important;
        position: relative !important;
        left: auto !important;
        transition: opacity 0.3s ease-in;
      }
      .flowtask-loader {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #064182 0%, #0a5ba3 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      .flowtask-loader.hidden {
        opacity: 0 !important; visibility: hidden !important; pointer-events: none !important;
      }
      .loader-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-text { color: #fff; margin-top: 1rem; font-size: 1.1rem; font-weight: 500; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="../css/flowtask.css" />
  </head>
  <body>

    <!-- Loader -->
    <div class="flowtask-loader" id="flowtask-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Cargando FlowTask...</div>
    </div>

    <!-- Main container -->
    <div class="flowtask-container" id="flowtask-container">

      <!-- Header -->
      <div class="app-header-card compact">
        <div class="header-left">
          <h1>
            <span class="header-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="1"/>
                <path d="M9 12l2 2 4-4"/>
              </svg>
            </span>
            FlowTask
          </h1>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" id="btn-toggle-scan">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M3 7h3M3 12h3M3 17h3M18 7h3M18 12h3M18 17h3M7 3v3M12 3v3M17 3v3M7 18v3M12 18v3M17 18v3"/>
            </svg>
            Escanear
          </button>
          <button class="btn btn-secondary" id="btn-exportar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Exportar
          </button>
          <button class="btn btn-danger" id="btn-borrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
            </svg>
            Borrar
          </button>
        </div>
      </div>

      <!-- Scan Panel -->
      <div class="scan-panel" id="scan-panel" style="display:none;">
        <div class="scan-panel-inner">
          <div class="scan-task-info" id="scan-task-info">
            <span class="scan-task-label">Tarea activa:</span>
            <span class="scan-task-value" id="scan-task-display">Ninguna — escanea un QR de tarea</span>
          </div>
          <div class="scan-input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" class="scan-icon">
              <path d="M3 7h3M3 12h3M3 17h3M18 7h3M18 12h3M18 17h3M7 3v3M12 3v3M17 3v3M7 18v3M12 18v3M17 18v3"/>
            </svg>
            <input
              type="text"
              id="scan-input"
              class="scan-input"
              placeholder="Escanea QR de tarea o login de empleado..."
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div id="scan-info-msg" class="scan-info-msg" style="display:none;"></div>
        </div>
      </div>

      <!-- Dashboard -->
      <div class="dashboard-scroll">
        <div class="dashboard-grid" id="dashboard-grid">
          <!-- Rendered by JS -->
          <div class="dashboard-empty" id="dashboard-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/>
            </svg>
            <p>Cargando datos...</p>
          </div>
        </div>
      </div>

    </div><!-- /flowtask-container -->

    <!-- Modal: Task Detail -->
    <div class="modal-overlay" id="modal-detalle" style="display:none;">
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="modal-detalle-title">Detalle de Tarea</h2>
          <button class="modal-close" id="modal-detalle-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-detalle-body">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>

    <!-- Modal: Confirm Borrar -->
    <div class="modal-overlay" id="modal-borrar" style="display:none;">
      <div class="modal-card modal-card-sm">
        <div class="modal-header">
          <h2>Confirmar Borrado</h2>
          <button class="modal-close" id="modal-borrar-close">&times;</button>
        </div>
        <div class="modal-body">
          <p>¿Estás seguro de que deseas borrar <strong>todas las asignaciones</strong>? Esta acción no se puede deshacer.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="modal-borrar-cancel">Cancelar</button>
          <button class="btn btn-danger" id="modal-borrar-confirm">Borrar Todo</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="../js/flowtask.js"></script>
  </body>
</html>
